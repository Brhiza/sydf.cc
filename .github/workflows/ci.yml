name: 持续集成

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: 检查、测试和构建
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行质量检查
        run: npm run check
