name: 持续集成

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 检查、测试和构建
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 拉取代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行质量检查
        run: npm run check
